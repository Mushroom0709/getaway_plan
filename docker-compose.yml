services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: getaway_plan
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+aiomysql://root:getaway_mysql_2026@db:3306/getaway_plan
      JWT_SECRET: getaway_jwt_secret_key_2026
      ACCESS_PASSWORD_HASH: $$2b$$12$$AGDuQP3ZVOM6Vn1byujnsepgI3LgtTJt1Ich8SPFjcwJxGsJBWqty
      AMAP_KEY: f2a8c18781eefe2b345d24ca91418e96
    volumes:
      - ./frontend/dist:/app/static
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-10338}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: always

volumes:
  mysql_data: